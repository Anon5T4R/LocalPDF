name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential

      - name: Install JS deps
        run: npm ci

      - name: Montar assets do OCR (tesseract)
        run: bash scripts/fetch-tessdata.sh

      - name: Frontend build + testes
        run: |
          npm run build
          npm test

      - name: Rust check + testes
        working-directory: src-tauri
        run: |
          cargo check --locked
          cargo test --locked
